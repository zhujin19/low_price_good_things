{% extends 'base.html' %}
{% block title %}设置{% endblock %}
{% block content %}
<section class='bg-white rounded-lg border border-slate-200 shadow-sm p-5 space-y-5'>
  <h2 class='text-xl font-semibold'>系统设置</h2>
  <div class='grid md:grid-cols-2 gap-4'>
    <div class='border rounded-lg p-4'>
      <h3 class='font-semibold'>通知策略</h3>
      <p class='text-sm text-slate-500 mt-1'>建议：仅对“低于阈值且直飞”进行提醒，减少无效打扰。</p>
    </div>
    <div class='border rounded-lg p-4'>
      <h3 class='font-semibold'>巡检频率</h3>
      <p class='text-sm text-slate-500 mt-1'>建议：高峰期每 10 分钟，非高峰 30 分钟，兼顾时效与性能。</p>
    </div>
  </div>
  <p class='text-xs text-slate-400'>此页面当前为轻量展示版，可继续扩展为可配置表单。</p>
</section>
{% endblock %}
