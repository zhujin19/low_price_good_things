{% extends 'base.html' %}
{% block title %}日志{% endblock %}
{% block content %}
<section class='bg-white rounded-2xl shadow-sm p-6'>
  <h2 class='text-xl font-bold mb-4'>采集日志</h2>
  <div class='overflow-auto'>
    <table class='min-w-full text-sm'>
      <thead class='bg-slate-100'>
        <tr><th class='text-left p-2'>时间</th><th class='text-left p-2'>渠道</th><th class='text-left p-2'>状态</th><th class='text-left p-2'>内容</th></tr>
      </thead>
      <tbody>
        {% for r in rows %}
        <tr class='border-b'>
          <td class='p-2'>{{ r.created_at }}</td><td class='p-2'>{{ r.provider }}</td><td class='p-2'>{{ r.level }}</td><td class='p-2'>{{ r.message }}</td>
        </tr>
        {% else %}
        <tr><td class='p-3 text-slate-500' colspan='4'>暂无日志。</td></tr>
        {% endfor %}
      </tbody>
    </table>
  </div>
</section>
{% endblock %}
