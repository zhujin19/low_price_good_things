{% extends 'base.html' %}{% block content %}<form method='post' action='{{ "/tasks/" ~ task.id ~ "/update" if task else "/tasks" }}' class='grid grid-cols-1 md:grid-cols-2 gap-3'><input name='name' placeholder='名称' value='{{task.name if task}}' class='border p-2'><input name='origin_city' value='{{task.origin_city if task else "北京"}}' class='border p-2'><input name='destination_city' value='{{task.destination_city if task else "武汉"}}' class='border p-2'><input name='weekday' type='number' min='0' max='6' value='{{task.weekday if task else 4}}' class='border p-2'><input name='time_start' value='{{task.time_start if task else "18:00:00"}}' class='border p-2'><input name='time_end' value='{{task.time_end if task else "23:59:59"}}' class='border p-2'><input name='max_price' type='number' value='{{task.max_price if task else 500}}' class='border p-2'><label><input type='checkbox' name='enabled' {% if not task or task.enabled %}checked{% endif %}>启用</label><button class='bg-blue-600 text-white p-2 rounded'>保存</button></form>{% endblock %}
