<!doctype html>
<html lang='zh-CN'>
<head>
  <meta charset='utf-8'>
  <meta name='viewport' content='width=device-width,initial-scale=1'>
  <title>{% block title %}低价机票监控{% endblock %}</title>
  <script src='https://cdn.tailwindcss.com'></script>
</head>
<body class='min-h-screen bg-slate-100 text-slate-800'>
  <header class='bg-slate-900 text-slate-100 px-4 md:px-8 py-4 shadow-sm'>
    <div class='max-w-[1600px] mx-auto flex flex-col gap-3 md:flex-row md:items-center md:justify-between'>
      <h1 class='text-2xl font-bold'>低价票助手</h1>
      <nav class='flex flex-wrap gap-2 text-sm'>
        <a class='px-3 py-2 rounded hover:bg-slate-800 bg-slate-800' href='/'>Dashboard</a>
        <a class='px-3 py-2 rounded hover:bg-slate-800' href='/tasks'>任务</a>
        <a class='px-3 py-2 rounded hover:bg-slate-800' href='/results'>低价票结果</a>
        <a class='px-3 py-2 rounded hover:bg-slate-800' href='/history'>价格历史</a>
        <a class='px-3 py-2 rounded hover:bg-slate-800' href='/provider-logs'>采集日志</a>
        <a class='px-3 py-2 rounded hover:bg-slate-800' href='/settings'>设置</a>
      </nav>
    </div>
  </header>

  <main class='p-4 md:p-8'>
    <div class='max-w-[1600px] mx-auto'>
      {% block content %}{% endblock %}
    </div>
  </main>
</body>
</html>
