<!doctype html>
<html lang='zh-CN'>
<head>
  <meta charset='utf-8'>
  <meta name='viewport' content='width=device-width,initial-scale=1'>
  <title>{% block title %}低价机票监控{% endblock %}</title>
  <script src='https://cdn.tailwindcss.com'></script>
</head>
<body class='min-h-screen bg-slate-100 text-slate-800'>
  {% set path = request.url.path %}
  <header class='bg-white border-b border-slate-200 px-4 md:px-8 py-3 shadow-sm'>
    <div class='max-w-[1600px] mx-auto flex flex-col gap-3 md:flex-row md:items-center'>
      <h1 class='text-lg font-semibold text-slate-900'>机票监控助手</h1>
      <nav class='flex flex-wrap gap-1 text-sm md:ml-4'>
        {% for href, label in [('/', '概览'), ('/tasks', '任务'), ('/results', '低价票'), ('/history', '历史'), ('/provider-logs', '日志'), ('/settings', '设置')] %}
        <a class='px-3 py-2 rounded-md {{ "bg-slate-900 text-white" if (path == href or (href != "/" and path.startswith(href))) else "text-slate-600 hover:bg-slate-100 hover:text-slate-900" }}' href='{{ href }}'>{{ label }}</a>
        {% endfor %}
      </nav>
    </div>
  </header>

  <main class='p-4 md:p-6'>
    <div class='max-w-[1600px] mx-auto'>
      {% block content %}{% endblock %}
    </div>
  </main>
  <div id='toast-root' class='fixed right-4 top-4 z-50 flex w-[calc(100%-2rem)] max-w-sm flex-col gap-2'></div>
  <script>
    window.showToast = function(message, type) {
      if (!message) return;
      const root = document.getElementById('toast-root');
      const toast = document.createElement('div');
      const tone = type === 'error'
        ? 'border-red-200 bg-red-50 text-red-800'
        : type === 'success'
          ? 'border-emerald-200 bg-emerald-50 text-emerald-800'
          : 'border-blue-200 bg-blue-50 text-blue-800';
      toast.className = 'rounded-md border px-4 py-3 text-sm shadow-lg ' + tone;
      toast.textContent = message;
      root.appendChild(toast);
      window.setTimeout(function() {
        toast.classList.add('opacity-0');
        toast.style.transition = 'opacity 180ms ease';
        window.setTimeout(function() { toast.remove(); }, 220);
      }, 4200);
    };

    const initialToast = {{ toast_message|default('', true)|tojson }};
    if (initialToast) {
      window.showToast(initialToast, 'success');
    }
  </script>
</body>
</html>
