{% extends 'base.html' %}{% block content %}<a class='bg-blue-500 text-white px-3 py-2 rounded' href='/tasks/new'>新增任务</a><div class='mt-4 overflow-auto'><table class='min-w-full text-sm'><tr><th>名称</th><th>航线</th><th>操作</th></tr>{% for t in tasks %}<tr><td>{{t.name}}</td><td>{{t.origin_city}}→{{t.destination_city}}</td><td class='space-x-2'><a href='/tasks/{{t.id}}/edit'>编辑</a><form action='/tasks/{{t.id}}/run' method='post' class='inline'><button class='text-blue-600'>立即检测</button></form><form action='/tasks/{{t.id}}/delete' method='post' class='inline'><button class='text-red-600'>删除</button></form></td></tr>{% endfor %}</table></div>{% endblock %}
